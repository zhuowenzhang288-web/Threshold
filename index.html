<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threshold - AI · Math · Growth</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #1a1a1a;
      --secondary: #f3f4f6;
      --accent: #3b82f6;
    }
    .hero-bg {
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .parallax-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: 0;
    }
    .main-bg {
      position: relative;
      min-height: 100vh;
    }
    #mainContent > div,
    #mainContent > section {
      position: relative;
      z-index: 2;
    }
    .note-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }
    .tag-badge {
      transition: all 0.2s;
    }
    .tag-badge:hover {
      background-color: #e5e7eb;
    }
    .sidebar-sticky {
      position: sticky;
      top: 80px;
    }
    .markdown-content h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
    }
    .markdown-content h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }
    .markdown-content ul {
      list-style-type: disc;
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }
    .markdown-content p {
      margin-bottom: 0.75rem;
      line-height: 1.7;
    }
  </style>
</head>
<body style="margin:0;padding:0;">
  <!-- Video Background - Global Fixed -->
  <video id="globalVideoBg" autoplay muted loop playsinline webkit-playsinline poster="/Threshold/bg.jpg"
    style="position:fixed;top:0;left:0;min-width:100vw;min-height:100vh;width:100vw;height:100vh;object-fit:cover;z-index:0;background:url('/Threshold/bg.jpg') center/cover no-repeat;">
    <source src="/Threshold/bg.mp4" type="video/mp4">
  </video>
  <!-- Minimal overlay -->
  <div style="position:fixed;inset:0;background:rgba(0,0,0,0.05);z-index:0;pointer-events:none;"></div>
  <script>
    (function() {
      var v = document.getElementById('globalVideoBg');
      if (!v) return;
      function tryPlay() { var p = v.play(); if (p && p.catch) p.catch(function(){}); }
      tryPlay();
      v.addEventListener('loadeddata', tryPlay);
      document.addEventListener('touchstart', tryPlay, {once:true});
      document.addEventListener('click', tryPlay, {once:true});
    })();
  </script>

  <!-- Navigation -->
  <nav class="sticky top-0 z-50 text-white" style="background:rgba(0,0,0,0.15);backdrop-filter:blur(4px);border-bottom:1px solid rgba(255,255,255,0.1);">
    <div class="container mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <a href="#" onclick="showHome()" class="flex items-center gap-2 font-semibold text-lg">
          <i class="fas fa-book-open"></i>
          <span>Threshold</span>
        </a>
        <div class="hidden md:flex items-center gap-1">
          <a href="#" onclick="showHome()" class="px-3 py-2 text-sm rounded-md hover:bg-white/20 transition">Home</a>
          <a href="#" onclick="showArchives()" class="px-3 py-2 text-sm rounded-md hover:bg-white/20 transition">Archives</a>
          <a href="#" onclick="showTags()" class="px-3 py-2 text-sm rounded-md hover:bg-white/20 transition">Tags</a>
          <a href="#" onclick="showCategories()" class="px-3 py-2 text-sm rounded-md hover:bg-white/20 transition">Categories</a>
          <a href="#" onclick="showAbout()" class="px-3 py-2 text-sm rounded-md hover:bg-white/20 transition">About</a>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="showSearch()" class="p-2 hover:bg-white/20 rounded-md transition" title="Search">
            <i class="fas fa-search"></i>
          </button>
          <button onclick="showAdmin()" class="p-2 hover:bg-white/20 rounded-md transition">
            <i class="fas fa-user"></i>
          </button>
          <button class="md:hidden p-2 hover:bg-white/20 rounded-md transition" onclick="toggleMobileMenu()">
            <i class="fas fa-bars"></i>
          </button>
        </div>
      </div>
      <!-- Mobile Menu -->
      <div id="mobileMenu" class="hidden md:hidden pb-4" style="background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);">
        <a href="#" onclick="showHome(); toggleMobileMenu()" class="block px-4 py-3 text-sm hover:bg-white/20 rounded-md">Home</a>
        <a href="#" onclick="showArchives(); toggleMobileMenu()" class="block px-4 py-3 text-sm hover:bg-white/20 rounded-md">Archives</a>
        <a href="#" onclick="showTags(); toggleMobileMenu()" class="block px-4 py-3 text-sm hover:bg-white/20 rounded-md">Tags</a>
        <a href="#" onclick="showCategories(); toggleMobileMenu()" class="block px-4 py-3 text-sm hover:bg-white/20 rounded-md">Categories</a>
        <a href="#" onclick="showAbout(); toggleMobileMenu()" class="block px-4 py-3 text-sm hover:bg-white/20 rounded-md">About</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main id="mainContent" class="main-bg">
    <!-- Content will be dynamically loaded here -->
  </main>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
    <span id="toastMessage"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>
